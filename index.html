<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纪念生物地理老师</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: url("./img/bg.jpg") no-repeat center fixed;
            background-size: cover;
            min-height: 100vh;
            color: #222;
        }
        .mask {
            width: 100%;
            min-height: 100vh;
            background: rgba(255,255,255,0.88);
            padding: 40px 20px;
        }
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #4a9c7d;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 2.4rem;
            color: #2d7d5c;
            margin-bottom: 12px;
        }
        .sub-title {
            font-size: 1.1rem;
            color: #555;
        }
        .teacher-box {
            max-width: 1100px;
            margin: 0 auto 60px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 35px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(74,156,125,0.18);
            transition: 0.3s ease;
        }
        .card:hover {
            transform: translateY(-6px);
        }
        .card-img {
            width: 100%;
            height: 360px;
            object-fit: cover;
        }
        .card-text {
            padding: 24px;
        }
        .card h2 {
            color: #2d7d5c;
            margin-bottom: 10px;
        }
        .card p {
            line-height: 1.7;
            color: #444;
            margin-top: 8px;
        }
        .memory {
            max-width: 1100px;
            margin: 0 auto 60px;
        }
        .memory h2 {
            text-align: center;
            color: #2d7d5c;
            margin-bottom: 25px;
            font-size: 1.8rem;
        }
        .memory-img {
            width: 100%;
            border-radius: 14px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.12);
        }
        .memory-desc {
            text-align: center;
            margin-top: 15px;
            line-height: 1.8;
            font-size: 1.05rem;
        }
        footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 20px;
            color: #666;
            font-size: 0.95rem;
        }
        @media (max-width:600px) {
            h1 {
                font-size: 1.8rem;
            }
            .card-img {
                height: 280px;
            }
        }
    </style>
</head>
<body>
    <div class="mask">
        <header>
            <h1>告别生地课堂，不忘恩师教诲</h1>
            <p class="sub-title">升初三再无生物地理课，以此网页纪念两位老师</p>
        </header>

        <div class="teacher-box">
            <div class="card">
                <img src="./img/bio.jpg" alt="生物老师" class="card-img">
                <div class="card-text">
                    <h2>生物老师</h2>
                    <p>谢谢您带我们认识细胞、山河生灵，教会我们生命的美好与珍贵。课堂上生动有趣的讲解，我们永远记在心里。</p>
                </div>
            </div>
            <div class="card">
                <img src="./img/geo.jpg" alt="地理老师" class="card-img">
                <div class="card-text">
                    <h2>地理老师</h2>
                    <p>一张地图看遍世界，经纬、气候、山川湖海，是您为我们打开地球的大门。</p>
                </div>
            </div>
        </div>

        <div class="memory">
            <h2>我们的生地课堂回忆</h2>
            <img src="./img/class.jpg" alt="班级合照" class="memory-img">
            <p class="memory-desc">两年生地时光匆匆结束，即将奔赴初三。感恩两位老师两年陪伴，谆谆教诲，终生难忘。</p>
        </div>

        <footer>
            <p>2026届初二毕业生制作｜纪念生物地理恩师</p>
        </footer>
    </div>
</body>
</html>
